<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Численность</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ds-accent-blue:        #3B82F6;
            --ds-accent-blue-subtle: #DBEAFE;
            --ds-bg-card:            #FFFFFF;
            --ds-bg-muted:           #F0F2F5;
            --ds-bg-primary:         #FAFBFC;
            --ds-bg-secondary:       #F5F7F9;
            --ds-border-light:       #E5E9EF;
            --ds-radius-lg:          16px;
            --ds-radius-md:          10px;
            --ds-radius-pill:        999px;
            --ds-success:            #10B981;
            --ds-success-light:      #D1FAE5;
            --ds-error:              #EF4444;
            --ds-error-light:        #FEE2E2;
            --ds-text-inverse:       #FFFFFF;
            --ds-text-muted:         #9BA3AF;
            --ds-text-primary:       #1A1D21;
            --ds-text-secondary:     #5C6370;
            --ds-warning:            #F59E0B;
            --ds-warning-light:      #FEF3C7;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--ds-bg-primary);
            min-height: 100vh;
            color: var(--ds-text-primary);
        }

        .navbar {
            display: flex; align-items: center; justify-content: space-between;
            height: 60px; padding: 0 32px;
            background: var(--ds-bg-card);
            border-bottom: 1px solid var(--ds-border-light);
            position: sticky; top: 0; z-index: 100;
        }
        .nav-left { display: flex; align-items: center; gap: 8px; }
        .nav-icon { color: var(--ds-accent-blue); display: flex; }
        .nav-title { font-size: 16px; font-weight: 600; }
        .nav-right { display: flex; align-items: center; gap: 16px; }
        .nav-date { font-size: 13px; color: var(--ds-text-muted); }
        .nav-avatar {
            width: 32px; height: 32px; background: var(--ds-accent-blue);
            border-radius: 999px; display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 600; color: var(--ds-text-inverse);
        }

        .content {
            padding: 32px; max-width: 1100px; margin: 0 auto;
            display: flex; flex-direction: column; gap: 16px;
        }
        .page-header { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
        .page-title { font-size: 24px; font-weight: 600; }
        .page-subtitle { font-size: 14px; color: var(--ds-text-muted); }

        .tribe-card {
            background: var(--ds-bg-card);
            border: 1px solid var(--ds-border-light);
            border-radius: var(--ds-radius-lg);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 32px;
        }
        .tribe-name {
            font-size: 13px; font-weight: 500;
            color: var(--ds-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            white-space: nowrap;
        }
        .tribe-total {
            font-family: 'JetBrains Mono', monospace;
            font-size: 40px; font-weight: 600;
            color: var(--ds-text-primary);
            line-height: 1;
        }
        .tribe-divider { width: 1px; height: 40px; background: var(--ds-border-light); }
        .tribe-stats { display: flex; gap: 24px; align-items: center; }
        .tribe-stat { display: flex; flex-direction: column; gap: 3px; }
        .tribe-stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 20px; font-weight: 600; line-height: 1;
        }
        .tribe-stat-value.hired   { color: var(--ds-accent-blue); }
        .tribe-stat-value.vacancy { color: var(--ds-warning); }
        .tribe-stat-label { font-size: 11px; color: var(--ds-text-muted); }

        .sections-row { display: flex; gap: 16px; align-items: flex-start; }

        .section-card {
            background: var(--ds-bg-card);
            border: 1px solid var(--ds-border-light);
            border-radius: var(--ds-radius-lg);
            padding: 20px;
            display: flex; flex-direction: column; gap: 16px;
        }
        .section-header {
            display: flex; align-items: center;
            justify-content: space-between; gap: 12px;
        }
        .section-name { font-size: 14px; font-weight: 600; color: var(--ds-text-primary); }
        .section-total {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px; font-weight: 500;
            background: var(--ds-bg-muted);
            color: var(--ds-text-secondary);
            border-radius: var(--ds-radius-pill);
            padding: 3px 10px;
        }

        .stats-row { display: flex; gap: 8px; }
        .stat-block {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; gap: 5px;
            padding: 12px 8px;
            border-radius: var(--ds-radius-md);
        }
        .stat-block.hired    { background: var(--ds-accent-blue-subtle); }
        .stat-block.vacancy  { background: var(--ds-warning-light); }
        .stat-block.searching{ background: var(--ds-warning-light); }
        .stat-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px; font-weight: 600; line-height: 1;
        }
        .stat-block.hired     .stat-number { color: var(--ds-accent-blue); }
        .stat-block.vacancy   .stat-number { color: var(--ds-warning); }
        .stat-block.searching .stat-number { color: var(--ds-warning); }
        .stat-label { font-size: 11px; color: var(--ds-text-muted); white-space: nowrap; }

        .staff-card { width: 240px; flex-shrink: 0; }

        .vendor-section { flex: 1; display: flex; flex-direction: column; gap: 12px; }
        .vendor-header { display: flex; align-items: center; gap: 10px; padding: 0 4px; }
        .vendor-title { font-size: 14px; font-weight: 600; color: var(--ds-text-primary); }
        .vendor-total {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px; font-weight: 500;
            background: var(--ds-bg-muted);
            color: var(--ds-text-secondary);
            border-radius: var(--ds-radius-pill);
            padding: 3px 10px;
        }
        .vendor-companies { display: flex; gap: 12px; }
        .company-card {
            flex: 1;
            background: var(--ds-bg-card);
            border: 1px solid var(--ds-border-light);
            border-radius: var(--ds-radius-lg);
            padding: 16px;
            display: flex; flex-direction: column; gap: 12px;
        }
        .company-name { font-size: 13px; font-weight: 600; color: var(--ds-text-primary); }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <span class="nav-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
            </svg>
        </span>
        <span class="nav-title">МоёУправление</span>
    </div>
    <div class="nav-right">
        <span class="nav-date">Март 2026</span>
        <div class="nav-avatar">АИ</div>
    </div>
</nav>

<main class="content">

    <div class="page-header">
        <h1 class="page-title">Численность трайба</h1>
        <p class="page-subtitle">Штатные сотрудники и вендор · Март 2026</p>
    </div>

    <div class="tribe-card">
        <span class="tribe-name">Трайб</span>
        <span class="tribe-total" id="tribe-total">—</span>
        <div class="tribe-divider"></div>
        <div class="tribe-stats">
            <div class="tribe-stat">
                <span class="tribe-stat-value hired" id="tribe-hired">—</span>
                <span class="tribe-stat-label">нанятых</span>
            </div>
            <div class="tribe-stat">
                <span class="tribe-stat-value vacancy" id="tribe-open">—</span>
                <span class="tribe-stat-label">открытых позиций</span>
            </div>
        </div>
    </div>

    <div class="sections-row">

        <div class="section-card staff-card">
            <div class="section-header">
                <span class="section-name">Штатные</span>
                <span class="section-total" id="staff-total">—</span>
            </div>
            <div class="stats-row">
                <div class="stat-block hired">
                    <span class="stat-number" id="staff-hired">—</span>
                    <span class="stat-label">нанятых</span>
                </div>
                <div class="stat-block vacancy">
                    <span class="stat-number" id="staff-vacancy">—</span>
                    <span class="stat-label">вакансий</span>
                </div>
            </div>
        </div>

        <div class="vendor-section">
            <div class="vendor-header">
                <span class="vendor-title">Вендор</span>
                <span class="vendor-total" id="vendor-total">—</span>
            </div>
            <div class="vendor-companies" id="vendor-companies"></div>
        </div>

    </div>

</main>

<script>
const DATA = {
    staff: { hired: 68, vacancy: 14 },
    vendor: [
        { name: 'Компания А', hired: 18, searching: 4 },
        { name: 'Компания И', hired: 13, searching: 3 },
        { name: 'Компания С', hired:  6, searching: 1 }
    ]
};

const staffTotal  = DATA.staff.hired + DATA.staff.vacancy;
const vendorHired = DATA.vendor.reduce((s, c) => s + c.hired, 0);
const vendorOpen  = DATA.vendor.reduce((s, c) => s + c.searching, 0);
const vendorTotal = vendorHired + vendorOpen;
const tribeHired  = DATA.staff.hired + vendorHired;
const tribeOpen   = DATA.staff.vacancy + vendorOpen;
const tribeTotal  = tribeHired + tribeOpen;

document.getElementById('tribe-total').textContent  = tribeTotal;
document.getElementById('tribe-hired').textContent  = tribeHired;
document.getElementById('tribe-open').textContent   = tribeOpen;
document.getElementById('staff-total').textContent  = staffTotal;
document.getElementById('staff-hired').textContent  = DATA.staff.hired;
document.getElementById('staff-vacancy').textContent = DATA.staff.vacancy;
document.getElementById('vendor-total').textContent = vendorTotal;

const companiesEl = document.getElementById('vendor-companies');
DATA.vendor.forEach(c => {
    const card = document.createElement('div');
    card.className = 'company-card';
    const name = document.createElement('div');
    name.className = 'company-name';
    name.textContent = c.name;
    const stats = document.createElement('div');
    stats.className = 'stats-row';
    const hired = document.createElement('div');
    hired.className = 'stat-block hired';
    hired.innerHTML = `<span class="stat-number">${c.hired}</span><span class="stat-label">нанятых</span>`;
    const searching = document.createElement('div');
    searching.className = 'stat-block searching';
    searching.innerHTML = `<span class="stat-number">${c.searching}</span><span class="stat-label">в поиске</span>`;
    stats.appendChild(hired);
    stats.appendChild(searching);
    card.appendChild(name);
    card.appendChild(stats);
    companiesEl.appendChild(card);
});
</script>

</body>
</html>
