<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Численность</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ds-accent-blue:        #3B82F6;
            --ds-accent-blue-subtle: #DBEAFE;
            --ds-bg-card:            #FFFFFF;
            --ds-bg-muted:           #F0F2F5;
            --ds-bg-primary:         #FAFBFC;
            --ds-bg-secondary:       #F5F7F9;
            --ds-border-light:       #E5E9EF;
            --ds-radius-lg:          16px;
            --ds-radius-md:          10px;
            --ds-radius-sm:          6px;
            --ds-radius-pill:        999px;
            --ds-success:            #10B981;
            --ds-success-light:      #D1FAE5;
            --ds-error:              #EF4444;
            --ds-error-light:        #FEE2E2;
            --ds-text-inverse:       #FFFFFF;
            --ds-text-muted:         #9BA3AF;
            --ds-text-primary:       #1A1D21;
            --ds-text-secondary:     #5C6370;
            --ds-warning:            #F59E0B;
            --ds-warning-light:      #FEF3C7;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--ds-bg-primary);
            min-height: 100vh;
            color: var(--ds-text-primary);
        }

        .navbar {
            display: flex; align-items: center; justify-content: space-between;
            height: 60px; padding: 0 32px;
            background: var(--ds-bg-card);
            border-bottom: 1px solid var(--ds-border-light);
            position: sticky; top: 0; z-index: 100;
        }
        .nav-left { display: flex; align-items: center; gap: 8px; }
        .nav-icon { color: var(--ds-accent-blue); display: flex; }
        .nav-title { font-size: 16px; font-weight: 600; }
        .nav-right { display: flex; align-items: center; gap: 16px; }
        .nav-date { font-size: 13px; color: var(--ds-text-muted); }
        .nav-avatar {
            width: 32px; height: 32px; background: var(--ds-accent-blue);
            border-radius: 999px; display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 600; color: var(--ds-text-inverse);
        }

        .content {
            padding: 32px; max-width: 1100px; margin: 0 auto;
            display: flex; flex-direction: column; gap: 16px;
        }
        .page-header { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
        .page-title { font-size: 24px; font-weight: 600; }
        .page-subtitle { font-size: 14px; color: var(--ds-text-muted); }

        /* Tribe summary card */
        .tribe-card {
            background: var(--ds-bg-card);
            border: 1px solid var(--ds-border-light);
            border-radius: var(--ds-radius-lg);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 32px;
        }
        .tribe-name {
            font-size: 13px; font-weight: 500;
            color: var(--ds-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            white-space: nowrap;
        }
        .tribe-total {
            font-family: 'JetBrains Mono', monospace;
            font-size: 40px; font-weight: 600;
            color: var(--ds-text-primary);
            line-height: 1;
        }
        .tribe-divider { width: 1px; height: 40px; background: var(--ds-border-light); flex-shrink: 0; }
        .tribe-formula {
            display: flex; align-items: center; gap: 8px;
            flex-wrap: wrap;
        }
        .tribe-formula-item { display: flex; flex-direction: column; gap: 2px; }
        .tribe-formula-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 20px; font-weight: 600; line-height: 1;
        }
        .tribe-formula-value.hired   { color: var(--ds-accent-blue); }
        .tribe-formula-value.vacancy { color: var(--ds-warning); }
        .tribe-formula-value.vendor  { color: var(--ds-text-secondary); }
        .tribe-formula-label { font-size: 11px; color: var(--ds-text-muted); }
        .tribe-plus {
            font-size: 18px; font-weight: 300;
            color: var(--ds-border-light);
            margin-top: -4px;
        }

        /* Section cards row */
        .sections-row { display: flex; gap: 16px; align-items: flex-start; }

        .section-card {
            background: var(--ds-bg-card);
            border: 1px solid var(--ds-border-light);
            border-radius: var(--ds-radius-lg);
            padding: 20px;
            display: flex; flex-direction: column; gap: 16px;
        }
        .section-header {
            display: flex; align-items: center;
            justify-content: space-between; gap: 12px;
        }
        .section-name { font-size: 14px; font-weight: 600; color: var(--ds-text-primary); }
        .section-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px; font-weight: 500;
            background: var(--ds-bg-muted);
            color: var(--ds-text-secondary);
            border-radius: var(--ds-radius-pill);
            padding: 3px 10px;
        }

        /* Stat blocks */
        .stats-row { display: flex; gap: 8px; }
        .stat-block {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; gap: 5px;
            padding: 12px 8px;
            border-radius: var(--ds-radius-md);
        }
        .stat-block.hired      { background: var(--ds-accent-blue-subtle); }
        .stat-block.vacancy    { background: var(--ds-warning-light); }
        .stat-block.searching  { background: var(--ds-warning-light); }
        .stat-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px; font-weight: 600; line-height: 1;
        }
        .stat-block.hired      .stat-number { color: var(--ds-accent-blue); }
        .stat-block.vacancy    .stat-number { color: var(--ds-warning); }
        .stat-block.searching  .stat-number { color: var(--ds-warning); }
        .stat-label { font-size: 11px; color: var(--ds-text-muted); white-space: nowrap; }

        /* Both section cards — equal fixed width */
        .staff-card,
        .vendor-card { width: 240px; flex-shrink: 0; }

        /* Company breakdown card */
        .companies-card { align-self: flex-start; }
        .companies-list { display: flex; gap: 12px; }

        /* Roles breakdown */
        .roles-list { display: flex; flex-direction: column; gap: 2px; }
        .role-item {
            display: flex; align-items: center; gap: 9px;
            padding: 6px 8px;
            border-radius: var(--ds-radius-sm);
        }
        .role-item:hover { background: var(--ds-bg-secondary); }
        .role-dot {
            width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
        }
        .role-label { font-size: 13px; color: var(--ds-text-secondary); flex: 1; }
        .role-count {
            font-size: 13px; font-weight: 600;
            color: var(--ds-text-primary);
        }
        .company-row {
            display: flex; flex-direction: column;
            gap: 10px;
            padding: 12px 14px;
            border-radius: var(--ds-radius-md);
            background: var(--ds-bg-secondary);
            min-width: 160px;
        }
        .company-name {
            font-size: 13px; font-weight: 600;
            color: var(--ds-text-primary);
        }
        .company-stats { display: flex; gap: 6px; align-items: center; }
        .company-chip {
            display: flex; align-items: center; gap: 4px;
            padding: 3px 8px;
            border-radius: var(--ds-radius-pill);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px; font-weight: 600;
        }
        .company-chip.hired {
            background: var(--ds-accent-blue-subtle);
            color: var(--ds-accent-blue);
        }
        .company-chip.searching {
            background: var(--ds-warning-light);
            color: var(--ds-warning);
        }
        .chip-label {
            font-family: 'Inter', sans-serif;
            font-size: 11px; font-weight: 400;
            opacity: 0.75;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <span class="nav-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
        </span>
        <span class="nav-title">МоёУправление</span>
    </div>
    <div class="nav-right">
        <span class="nav-date">Март 2026</span>
        <div class="nav-avatar">АИ</div>
    </div>
</nav>

<main class="content">

    <div class="page-header">
        <h1 class="page-title">Численность трайба</h1>
        <p class="page-subtitle">Штатные сотрудники и вендор · Март 2026</p>
    </div>

    <!-- Tribe summary -->
    <div class="tribe-card">
        <span class="tribe-name">Трайб</span>
        <span class="tribe-total" id="tribe-total">—</span>
        <div class="tribe-divider"></div>
        <div class="tribe-formula">
            <div class="tribe-formula-item">
                <span class="tribe-formula-value hired" id="tribe-staff-hired">—</span>
                <span class="tribe-formula-label">штатных нанято</span>
            </div>
            <span class="tribe-plus">+</span>
            <div class="tribe-formula-item">
                <span class="tribe-formula-value vacancy" id="tribe-staff-vacancy">—</span>
                <span class="tribe-formula-label">штатных вакансий</span>
            </div>
            <span class="tribe-plus">+</span>
            <div class="tribe-formula-item">
                <span class="tribe-formula-value vendor" id="tribe-vendor-hired">—</span>
                <span class="tribe-formula-label">нанято в подряде</span>
            </div>
        </div>
    </div>

    <!-- Sections -->
    <div class="sections-row">

        <!-- Staff -->
        <div class="section-card staff-card">
            <div class="section-header">
                <span class="section-name">Штатные</span>
                <span class="section-badge" id="staff-total">—</span>
            </div>
            <div class="stats-row">
                <div class="stat-block hired">
                    <span class="stat-number" id="staff-hired">—</span>
                    <span class="stat-label">нанятых</span>
                </div>
                <div class="stat-block vacancy">
                    <span class="stat-number" id="staff-vacancy">—</span>
                    <span class="stat-label">вакансий</span>
                </div>
            </div>
        </div>

        <!-- Vendor -->
        <div class="section-card vendor-card">
            <div class="section-header">
                <span class="section-name">Вендор</span>
                <span class="section-badge" id="vendor-total">—</span>
            </div>
            <div class="stats-row">
                <div class="stat-block hired">
                    <span class="stat-number" id="vendor-hired">—</span>
                    <span class="stat-label">нанятых</span>
                </div>
                <div class="stat-block searching">
                    <span class="stat-number" id="vendor-searching">—</span>
                    <span class="stat-label">в поиске</span>
                </div>
            </div>
        </div>

    </div>

    <!-- Company breakdown -->
    <div class="section-card companies-card">
        <div class="section-header">
            <span class="section-name">Декомпозиция вендора</span>
        </div>
        <div class="companies-list" id="companies-list"></div>
    </div>

    <!-- Roles breakdown -->
    <div class="section-card" style="align-self:flex-start;min-width:220px">
        <div class="section-header">
            <span class="section-name">По ролям</span>
        </div>
        <div class="roles-list" id="roles-list"></div>
    </div>

</main>

<script>
const DATA = {
    staff: { hired: 68, vacancy: 14 },
    vendor: [
        { name: 'Компания А', hired: 18, searching: 4 },
        { name: 'Компания И', hired: 13, searching: 3 },
        { name: 'Компания С', hired:  6, searching: 1 }
    ],
    roles: [
        { label: 'Backend',        count: 24, color: '#EA580C' },
        { label: 'Frontend',       count: 18, color: '#059669' },
        { label: 'Тестирование',   count: 12, color: '#D97706' },
        { label: 'Аналитика',      count:  9, color: '#2563EB' },
        { label: 'Сопровождение',  count:  8, color: '#DC2626' },
        { label: 'DevOps',         count:  6, color: '#7C3AED' },
        { label: 'PO / PL / DL',   count:  9, color: '#0891B2' },
    ]
};

const staffTotal    = DATA.staff.hired + DATA.staff.vacancy;
const vendorHired   = DATA.vendor.reduce((s, c) => s + c.hired, 0);
const vendorSearch  = DATA.vendor.reduce((s, c) => s + c.searching, 0);
const vendorTotal   = vendorHired + vendorSearch;
// Tribe total = all staff positions + vendor hired (vendor "в поиске" — not yet in the team)
const tribeTotal    = staffTotal + vendorHired;

document.getElementById('tribe-total').textContent         = tribeTotal;
document.getElementById('tribe-staff-hired').textContent   = DATA.staff.hired;
document.getElementById('tribe-staff-vacancy').textContent = DATA.staff.vacancy;
document.getElementById('tribe-vendor-hired').textContent  = vendorHired;
document.getElementById('staff-total').textContent         = staffTotal;
document.getElementById('staff-hired').textContent         = DATA.staff.hired;
document.getElementById('staff-vacancy').textContent       = DATA.staff.vacancy;
document.getElementById('vendor-total').textContent        = vendorTotal;
document.getElementById('vendor-hired').textContent        = vendorHired;
document.getElementById('vendor-searching').textContent    = vendorSearch;

const list = document.getElementById('companies-list');
DATA.vendor.forEach(c => {
    const row = document.createElement('div');
    row.className = 'company-row';
    row.innerHTML = `
        <span class="company-name">${c.name}</span>
        <div class="company-stats">
            <span class="company-chip hired">${c.hired} <span class="chip-label">нанято</span></span>
            <span class="company-chip searching">${c.searching} <span class="chip-label">в поиске</span></span>
        </div>`;
    list.appendChild(row);
});

const rolesList = document.getElementById('roles-list');
DATA.roles.forEach(r => {
    const item = document.createElement('div');
    item.className = 'role-item';
    item.innerHTML = `
        <span class="role-dot" style="background:${r.color}"></span>
        <span class="role-label">${r.label}</span>
        <span class="role-count">${r.count}</span>`;
    rolesList.appendChild(item);
});
</script>

</body>
</html>
