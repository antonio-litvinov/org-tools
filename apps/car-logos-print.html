<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Логотипы автомобилей — для печати</title>
<style>
  @page { size: A4 portrait; margin: 8mm; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: white; font-family: Arial, sans-serif; }

  .page {
    width: 194mm;
    height: 281mm;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: repeat(4, 1fr);
    gap: 3mm;
    page-break-after: always;
  }
  .page:last-child { page-break-after: avoid; }

  .cell {
    border: 1.5px dashed #aaa;
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 4mm 3mm 3mm;
  }

  .cell img {
    width: auto;
    height: 42mm;
    max-width: 80mm;
    object-fit: contain;
  }

  .brand {
    font-size: 13pt;
    font-weight: 700;
    letter-spacing: 1px;
    color: #222;
    text-align: center;
  }
</style>
</head>
<body>

<!-- ===== PAGE 1 ===== -->
<div class="page">
  <div class="cell">
    <img src="https://raw.githubusercontent.com/filippofilip95/car-logos-dataset/master/logos/thumb/bmw.png" alt="BMW">
    <div class="brand">BMW</div>
  </div>
  <div class="cell">
    <img src="https://raw.githubusercontent.com/filippofilip95/car-logos-dataset/master/logos/thumb/mercedes-benz.png" alt="Mercedes-Benz">

  </div>
  <div class="cell">

  </div>

  <div class="cell">
